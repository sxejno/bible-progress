name: Build and Deploy

on:
  push:
    branches: [ main, 'claude/*' ]
    paths:
      - 'src/**'
      - 'build.js'
      - 'package.json'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run build
        run: npm run build

      - name: Check if index.html changed
        id: check_changes
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to index.html"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "index.html has changes"
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "🤖 Auto-build: Update index.html from source files

          Built from commit: ${{ github.sha }}
          Triggered by: ${{ github.event_name }}
          Branch: ${{ github.ref_name }}"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bible-progress-built
          path: index.html
          retention-days: 30
